    - name: Create fake config
      run: |
        mkdir -p config
        echo '{"data_dir": "data", "playlist_dir": "playlist"}' > config/common_config.json
        echo '{"eas_ip": "127.0.0.1"}' > config/scraper_config.json
        for f in area_codes.json generator_config.json formatter_config.json postprocessor_config.json; do
          echo '{}' > "config/$f"
        done
name: Run IPTV Tool

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install requests

    - name: Run iptvTool
      run: python main.py all   # 关键修改：--all 改为 all

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: iptv-playlist
        path: playlist/
