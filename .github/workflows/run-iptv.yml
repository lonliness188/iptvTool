name: Run IPTV Tool

on:
  schedule:
    - cron: '0 20 * * *'   # 每天 UTC 时间 20:00 运行，即北京时间次日凌晨4:00
  workflow_dispatch:       # 同时允许你手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # 确保安装核心依赖，避免运行失败
        pip install requests

    - name: Run iptvTool
      run: python main.py --all

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: iptv-playlist
        path: playlist/
